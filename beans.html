<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miru Coffee – Beans Detail</title>
  <link rel="stylesheet" href="style-shared.css" />
  <link rel="stylesheet" href="style-index.css" />
  <link rel="stylesheet" href="style-beans.css" />
</head>
<body>
  <!-- 共用頁首 -->
  <header id="shared-header"></header>

  <main>
    <div class="content">
      <!-- Bean 詳細內容（動態載入） -->
      <section class="card" id="bean-detail"></section>

      <!-- Other Origins 縮圖列表 加新豆要改這裏 -->
      <section class="card">
        <h3>Other Origins</h3>
        <div class="bean-thumbnails" id="bean-thumbnails">
          <!-- Active beans are loaded from beans/catalog.json -->
        </div>
      </section>
    </div>
  </main>

  <!-- 共用頁尾 -->
  <footer id="shared-footer"></footer>

  <!-- 圖片版本控制 & Utility -->
  <script src="js/bean-catalog.js"></script>
  <script>
    const version = Date.now();
    window.MIRU_ASSET_VERSION = version;
    let activeBeanList = [];

    function addVersionToImage(img) {
      const src = img.getAttribute("src");
      if (src && !src.includes("?v=")) img.src = `${src}?v=${version}`;
    }
    function refreshAllImages() {
      document.querySelectorAll("img").forEach(addVersionToImage);
    }
    function refreshMainImageVersion() {
      const mainImg = document.querySelector(".bean-full-image");
      if (mainImg) addVersionToImage(mainImg);
    }
    function getRequestedBeanCode() {
      return new URLSearchParams(location.search).get("code");
    }

    function getDefaultBeanCode() {
      return activeBeanList.length ? activeBeanList[0].code : null;
    }
  </script>

  <!-- 動態載入 Bean 內容 -->
  <script>
    function loadBean(bean) {
      if (!bean) {
        document.getElementById("bean-detail").innerHTML =
          "<p>No coffee origins are currently available.</p>";
        return;
      }

      fetch(bean.detail)
        .then((res) => res.text())
        .then((html) => {
          const container = document.getElementById("bean-detail");
          container.innerHTML = html;
          refreshMainImageVersion();
          container.scrollIntoView({ behavior: "smooth" });
        })
        .catch(() => {
          document.getElementById("bean-detail").innerHTML =
            "<p>Bean not found.</p>";
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
      MiruBeanCatalog.load()
        .then((catalog) => {
          activeBeanList = MiruBeanCatalog.activeBeans(catalog);
          const requested = getRequestedBeanCode();
          const initialCode = activeBeanList.some((bean) => bean.code === requested)
            ? requested
            : getDefaultBeanCode();

          MiruBeanCatalog.renderThumbnails(
            document.getElementById("bean-thumbnails"),
            activeBeanList,
            (bean) => {
              loadBean(bean);
              history.replaceState(null, "", `?code=${bean.code}`);
            }
          );

          loadBean(activeBeanList.find((bean) => bean.code === initialCode));
          refreshAllImages();
        })
        .catch(() => {
          document.getElementById("bean-detail").innerHTML =
            "<p>Unable to load coffee origins right now.</p>";
        });
    });
  </script>

  <!-- 載入共用 header、跑馬燈 與 footer -->
  <script>
    fetch("shared/header.html")
      .then((r) => r.text())
      .then((html) => {
        document.getElementById("shared-header").innerHTML = html;
        return fetch("MSG/001 announcement.txt");
      })
      .then((r) => r.text())
      .then((text) => {
        const m = document.getElementById("announcement-marquee");
        if (m) {
          m.textContent = text;
          m.setAttribute("scrollamount", "5");
          m.style.fontSize = "20px";
        }
      });

    fetch("shared/footer.html")
      .then((r) => r.text())
      .then((html) => {
        document.getElementById("shared-footer").innerHTML = html;
      });
  </script>
</body>
</html>
